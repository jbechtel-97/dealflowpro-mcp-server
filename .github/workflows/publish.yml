name: Publish to npm + MCP Registry

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for both npm provenance and MCP Registry OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish updated server.json to the official MCP Registry.
      # Without this step (added in the 1.2.3 republish window), npm got every
      # tagged release but the registry stayed stuck on whatever the most recent
      # manual `mcp-publisher publish` left — 1.0.1 through the 1.1.x/1.2.x series.
      # GitHub OIDC auth: zero secrets, server.json's `name: io.github.<owner>/...`
      # binds the publish identity to this repo automatically.
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin mcp-publisher
          chmod +x /usr/local/bin/mcp-publisher

      - name: Publish to MCP Registry
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish ./server.json
